# Shared Music Constraints
# 两套 prompt（clef-compose .claude/agents/ 和 clef-server server/config/prompts/）
# 中的纯音乐约束必须与此文件一致。test_prompt_parity.py 会验证。

global_constraints:
  - id: G1
    text: "所有声部小节数必须相同，不足用 z 补齐"
  - id: G2
    text: "所有声部使用头部 K: 声明的调号"
  - id: G3
    text: "只输出指定声部的 ABC 片段，不输出头部（X:, T:, M:, K: 等），不修改其他声部"
  - id: G4
    text: "定向修改时输出完整声部（含未修改小节），不是片段"
  - id: G5
    text: "无法满足指令时输出注释 % NOTE: 无法完成，原因..."

duration_table:
  note: "L:1/8 单位制"
  entries:
    - notation: "f"
      meaning: "八分音符"
      value: 1
    - notation: "f2"
      meaning: "四分音符"
      value: 2
    - notation: "f4"
      meaning: "二分音符"
      value: 4
    - notation: "f/2"
      meaning: "十六分音符"
      value: 0.5
    - notation: "f3/2"
      meaning: "附点八分音符"
      value: 1.5
    - notation: "z"
      meaning: "八分休止"
      value: 1
    - notation: "z2"
      meaning: "四分休止"
      value: 2

abc_octave_rules:
  - "小写字母 = C4 起始八度（a=A4=MIDI69, c=C4=MIDI60）"
  - "大写字母 = C3 起始八度（A=A3=MIDI57, C=C3=MIDI48）"
  - "逗号 , = 降低八度"
  - "撇号 ' = 升高八度"

self_check_items:
  - id: SC1
    name: "小节时值"
    text: "每小节所有音符/休止符的时值总和必须等于拍号规定的拍数"
  - id: SC2
    name: "音域合规"
    text: "所有音符必须在 plan.json 指定声部的 register/key_range 范围内"
  - id: SC3
    name: "ABC 八度规则"
    text: "小写=C4起，大写=C3起，逗号=低八度，撇号=高八度"
  - id: SC4
    name: "声部小节数"
    text: "输出小节数必须与 plan.json 对应 section 的 measures 一致"

sf2_parameters:
  - name: "key_range"
    description: "乐器物理音域极限（硬约束，不可超出）"
  - name: "sweet_spot"
    description: "采样最密集的最佳音域（软建议，>70% 音符应在此范围内）"
  - name: "vel_layers"
    description: "velocity 分层数（1=单层，不需要细腻力度变化）"
  - name: "avg_attack"
    description: "平均起音时间（秒，-1 表示未设置）"
  - name: "avg_release"
    description: "平均释放时间（秒，-1 表示未设置）"
  - name: "quality"
    description: "high/medium/low 采样质量"
  - name: "characteristics"
    description: "音色特征标签（percussive, sustained, slow_attack, long_release 等）"

drum_map:
  note: "与 abc_to_midi.py DRUM_MAP 完全一致"
  entries:
    - notation: "B,,"
      name: "Kick (低音鼓)"
      midi: 36
    - notation: "D,"
      name: "Snare (军鼓)"
      midi: 38
    - notation: "F,"
      name: "Closed Hi-Hat (闭镲)"
      midi: 42
    - notation: "G,"
      name: "Open Hi-Hat (开镲)"
      midi: 46
    - notation: "A,"
      name: "Crash (吊镲)"
      midi: 49
    - notation: "c"
      name: "Ride (叮叮镲)"
      midi: 51
    - notation: "d"
      name: "High Tom (高汤姆)"
      midi: 50
    - notation: "e"
      name: "Mid Tom (中汤姆)"
      midi: 47
    - notation: "f"
      name: "Low Tom (低汤姆)"
      midi: 45
